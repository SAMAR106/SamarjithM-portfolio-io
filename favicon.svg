<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a2e"/>
  
  <!-- Glow effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d696;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.2" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Circle with gradient -->
  <circle cx="50" cy="50" r="40" fill="url(#glow)" filter="url(#shadow)"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#00d696" stroke-width="2" opacity="0.7"/>
  
  <!-- Letter S -->
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#00d696" text-anchor="middle" filter="url(#shadow)">S</text>
  
  <!-- Decorative dots -->
  <circle cx="30" cy="30" r="3" fill="#a855f7" opacity="0.6"/>
  <circle cx="70" cy="70" r="3" fill="#a855f7" opacity="0.6"/>
</svg>